<!--Heading tags of are 6 types -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <h1>This is for heading1</h1> <!--It will show in large font-->
    <h2>This is for heading2</h2> <!--it will show  maller than h1-->
    <h3>This is for heading3</h3> <!--It will show smaller than h2-->
    <h4>This is for heading4</h4> <!--It will show smaller than h3-->
    <h5>This is for heading5</h5> <!--This will show smaller than h4-->
    <h6>This is for heading5</h6> <!--This will show smaller than h5-->
</body>
</html>
